name: Experto Profile CI

on:
  push:
    branches:
      - master
      - main
      - development
      - feature/*

  pull_request:
    branches:
      - master
      - main
      - development

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Application
        run: mvn clean package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: exporto-profile-jar
          path: target/*.jar