name: Experto Profile CI

on:
  push:
    branches:
      - master
      - main
      - development
      - feature/*

  pull_request:
    branches:
      - master
      - main
      - development

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Application
        run: mvn clean package

      - name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build Docker image
        run: |
          docker build -t nikhilraj3001/exporto-profile:${{ github.run_number }} .
          docker tag nikhilraj3001/exporto-profile:${{ github.run_number }} nikhilraj3001/exporto-profile:latest
      - name: Push Docker image
        run: |
          docker push nikhilraj3001/exporto-profile:${{ github.run_number }}
          docker push nikhilraj3001/exporto-profile:latest